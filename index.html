<style>
  :root{
    --bg:#eef2f5;
    --grid:#d9e3ea;
    --paper:#ffffff;
    --ink:#1e2a33;
    --ink-soft:#4b5b66;
    --chris:#1f6fa8;
    --chris-soft:#e4f0f8;
    --sofia:#7a4fa0;
    --sofia-soft:#f0e8f6;
    --good:#3f8f5f;
    --good-soft:#e6f4ec;
    --mid:#c9862b;
    --mid-soft:#faf0de;
    --bad:#b23b3b;
    --bad-soft:#fbe9e9;
    --line:#d3dde3;
    --shadow: 0 1px 2px rgba(30,42,51,0.06), 0 4px 14px rgba(30,42,51,0.05);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Inter',sans-serif;
    color:var(--ink);
    background-color:var(--bg);
    background-image:
      repeating-linear-gradient(0deg, var(--grid) 0px, var(--grid) 1px, transparent 1px, transparent 28px),
      repeating-linear-gradient(90deg, var(--grid) 0px, var(--grid) 1px, transparent 1px, transparent 28px);
    min-height:100vh;
    -webkit-tap-highlight-color: transparent;
  }
  h1,h2,h3,h4{font-family:'Space Grotesk',sans-serif; margin:0; letter-spacing:-0.01em;}
  .mono{font-family:'JetBrains Mono',monospace;}
  button{font-family:inherit; cursor:pointer;}
  .app{display:flex; min-height:100vh;}

  /* Sidebar */
  .sidebar{
    width:220px; flex-shrink:0; background:var(--paper);
    border-right:1px solid var(--line);
    padding:22px 14px; display:flex; flex-direction:column; gap:6px;
    position:sticky; top:52px; height:calc(100vh - 52px); overflow-y:auto;
  }
  .brand{padding:0 8px 18px 8px; border-bottom:1px solid var(--line); margin-bottom:10px;}
  .brand h1{font-size:1.15rem; line-height:1.25;}
  .brand .sub{font-size:0.72rem; color:var(--ink-soft); margin-top:4px;}
  .navtab{
    display:flex; align-items:center; gap:10px; padding:12px 12px; border-radius:10px;
    border:1px solid transparent; background:none; text-align:left; font-size:0.95rem; font-weight:600;
    color:var(--ink-soft); min-height:44px;
  }
  .navtab .dot{width:10px; height:10px; border-radius:3px; flex-shrink:0;}
  .navtab.active{background:var(--bg); border-color:var(--line); color:var(--ink);}
  .navtab[data-c="chris"] .dot{background:var(--chris);}
  .navtab[data-c="sofia"] .dot{background:var(--sofia);}
  .navtab[data-c="report"] .dot{background:var(--ink-soft);}
  .sidebar-note{margin-top:auto; font-size:0.7rem; color:var(--ink-soft); padding:10px 8px; line-height:1.5;}

  /* Mobile top tabs */
  .topbar{display:none;}

  main{flex:1; padding:28px 32px 80px; max-width:980px; margin:0 auto; width:100%;}

  .child-header{display:flex; align-items:baseline; gap:14px; margin-bottom:6px; flex-wrap:wrap;}
  .child-header h2{font-size:1.6rem;}
  .badge-grade{font-size:0.8rem; font-weight:600; padding:3px 10px; border-radius:20px;}
  .badge-grade.chris{background:var(--chris-soft); color:var(--chris);}
  .badge-grade.sofia{background:var(--sofia-soft); color:var(--sofia);}
  .child-sub{color:var(--ink-soft); margin-bottom:26px; font-size:0.92rem;}

  .week{
    background:var(--paper); border:1px solid var(--line); border-radius:14px; margin-bottom:16px;
    box-shadow:var(--shadow); overflow:hidden;
  }
  .week-head{
    display:flex; align-items:center; justify-content:space-between; padding:16px 20px;
    cursor:pointer; gap:12px; flex-wrap:wrap; min-height:44px;
  }
  .week-head:hover{background:var(--bg);}
  .week-head-left{display:flex; align-items:center; gap:14px; flex-wrap:wrap;}
  .week-num{
    font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:0.95rem;
    width:34px; height:34px; border-radius:9px; display:flex; align-items:center; justify-content:center;
    color:#fff; flex-shrink:0;
  }
  .week-num.chris{background:var(--chris);}
  .week-num.sofia{background:var(--sofia);}
  .week-title{font-weight:600; font-size:1.02rem;}
  .week-range{font-size:0.8rem; color:var(--ink-soft);}
  .week-status{display:flex; align-items:center; gap:8px;}
  .pill{font-size:0.75rem; font-weight:600; padding:4px 10px; border-radius:20px; white-space:nowrap;}
  .pill.pending{background:#eef1f3; color:var(--ink-soft);}
  .pill.done-good{background:var(--good-soft); color:var(--good);}
  .pill.done-mid{background:var(--mid-soft); color:var(--mid);}
  .pill.done-bad{background:var(--bad-soft); color:var(--bad);}
  .chevron{transition:transform 0.2s ease; color:var(--ink-soft); font-size:0.85rem;}
  .week.open .chevron{transform:rotate(90deg);}
  .week-body{display:none; border-top:1px solid var(--line); padding:6px 20px 22px;}
  .week.open .week-body{display:block;}

  .day{margin-top:18px;}
  .day-label{
    font-family:'Space Grotesk',sans-serif; font-size:0.85rem; font-weight:700; color:var(--ink-soft);
    text-transform:uppercase; letter-spacing:0.04em; margin-bottom:10px; display:flex; align-items:center; gap:8px;
  }
  .day-label .date{font-weight:500; text-transform:none; letter-spacing:0; color:var(--ink-soft); font-family:'Inter',sans-serif;}

  .ex-card{
    border:1px solid var(--line); border-radius:10px; padding:14px 16px; margin-bottom:10px; background:#fbfcfd;
  }
  .ex-aufgabe{font-size:0.96rem; line-height:1.5; margin-bottom:10px;}
  .ex-aufgabe b{font-family:'Space Grotesk',sans-serif;}
  .reveal-row{display:flex; gap:8px; flex-wrap:wrap;}
  .ans-row{display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:4px;}
  .ans-label{font-size:0.85rem; font-weight:700; color:var(--ink-soft); font-family:'Space Grotesk',sans-serif; flex-shrink:0;}
  .ans-input{
    flex:1; min-width:140px; padding:9px 12px; border:1px solid var(--line); border-radius:8px;
    font-family:'JetBrains Mono',monospace; font-size:0.9rem; background:#fff;
  }
  .ans-input:focus{outline:none; border-color:var(--ink-soft); box-shadow:0 0 0 3px #eef1f3;}
  .ans-input.correct{background:var(--good-soft); border-color:var(--good); color:#1f5c3a; font-weight:600;}
  .ans-input.incorrect{background:var(--bad-soft); border-color:var(--bad); color:#7a2323; font-weight:600;}
  .ans-icon{width:24px; text-align:center; font-size:1.15rem; flex-shrink:0;}
  .btn{
    border:1px solid var(--line); background:#fff; padding:8px 14px; border-radius:8px; font-size:0.82rem;
    font-weight:600; color:var(--ink); min-height:38px; display:inline-flex; align-items:center; gap:6px;
  }
  .btn:hover{background:var(--bg);}
  .btn.done{background:var(--good-soft); border-color:var(--good); color:var(--good);}
  .reveal-block{margin-top:10px; padding:10px 12px; border-radius:8px; font-size:0.88rem; line-height:1.55;}
  .reveal-block.prinzip{background:var(--chris-soft); color:#1a4c6b;}
  .reveal-block.weg{background:#f4f1e6; color:#5b4a1e; font-family:'JetBrains Mono',monospace; font-size:0.84rem; white-space:pre-wrap;}
  .reveal-block.loesung{background:var(--good-soft); color:#1f5c3a; font-weight:600;}
  .reveal-block .label{display:block; font-size:0.7rem; text-transform:uppercase; letter-spacing:0.05em; opacity:0.75; margin-bottom:4px; font-weight:700; font-family:'Inter',sans-serif;}

  .test-block{
    margin-top:22px; border:2px dashed var(--line); border-radius:12px; padding:18px 18px 20px; background:#fffdf7;
  }
  .big-exam-block{
    border:2px solid #c9862b; background:#fffaf0;
  }
  .test-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; flex-wrap:wrap; gap:8px;}
  .test-head h4{font-size:1rem;}
  .test-sub{font-size:0.8rem; color:var(--ink-soft); margin-bottom:14px;}
  .test-q{border-bottom:1px solid var(--line); padding:12px 0;}
  .test-q.test-q-part{padding-left:18px; border-bottom:1px dashed var(--line);}
  .test-context{font-size:0.94rem; line-height:1.5; padding:10px 0 4px; font-style:italic; color:var(--ink-soft);}
  .test-locked{
    display:flex; align-items:center; gap:16px; padding:20px 10px; text-align:left;
  }
  .lock-icon{font-size:2rem; flex-shrink:0;}
  .lock-text{font-size:0.9rem; line-height:1.5; color:var(--ink-soft);}
  .lock-text b{color:var(--ink); font-family:'Space Grotesk',sans-serif;}
  .preview-banner{
    background:var(--mid-soft); color:var(--mid); border:1px solid var(--mid); border-radius:8px;
    padding:9px 12px; font-size:0.82rem; margin-bottom:14px; font-weight:600;
  }
  .test-q:last-of-type{border-bottom:none;}
  .test-q-top{display:flex; justify-content:space-between; gap:12px; align-items:flex-start; flex-wrap:wrap;}
  .test-q-text{font-size:0.94rem; line-height:1.5; max-width:640px;}
  .test-points{display:flex; align-items:center; gap:6px; flex-shrink:0;}
  .test-points input{
    width:56px; padding:6px 8px; border:1px solid var(--line); border-radius:6px; font-size:0.9rem;
    font-family:'JetBrains Mono',monospace; text-align:center;
  }
  .test-points span{font-size:0.78rem; color:var(--ink-soft);}
  .sol-toggle{margin-top:8px; font-size:0.78rem; color:var(--ink-soft); background:none; border:none; text-decoration:underline; padding:4px 0; min-height:auto;}
  .sol-box{margin-top:6px; padding:8px 10px; background:var(--good-soft); color:#1f5c3a; border-radius:6px; font-size:0.85rem; font-weight:600;}
  .test-q .ans-row{margin-top:8px;}
  .review-item{border-radius:10px; padding:14px 16px; margin-bottom:12px; border:1px solid var(--line);}
  .review-item.review-correct{background:var(--good-soft); border-color:var(--good);}
  .review-item.review-wrong{background:var(--bad-soft); border-color:var(--bad);}
  .review-q{font-size:0.94rem; margin-bottom:8px; line-height:1.5;}
  .review-line{font-size:0.86rem; line-height:1.6;}
  .followthrough-note{margin-top:6px; padding:6px 9px; background:var(--mid-soft); color:var(--mid); border-radius:6px; font-weight:600; font-size:0.8rem;}
  .review-label{font-weight:700; font-family:'Space Grotesk',sans-serif; margin-right:4px;}
  .review-list{margin-top:6px;}

  .test-footer{display:flex; align-items:center; justify-content:space-between; margin-top:16px; flex-wrap:wrap; gap:14px;}
  .save-btn{background:var(--ink); color:#fff; border:none; padding:11px 20px; border-radius:9px; font-weight:700; font-size:0.9rem; min-height:44px;}
  .save-btn:hover{background:#000;}
  .save-btn:disabled{opacity:0.4;}

  .stamp{
    display:inline-flex; align-items:center; gap:10px; padding:10px 16px; border-radius:10px;
    border:3px solid; transform:rotate(-2deg); font-family:'Space Grotesk',sans-serif; font-weight:700;
  }
  .stamp .n{font-size:1.5rem;}
  .stamp .t{font-size:0.72rem; text-transform:uppercase; letter-spacing:0.04em; font-weight:600;}
  .stamp.g1, .stamp.g2{border-color:var(--good); color:var(--good); background:var(--good-soft);}
  .stamp.g3, .stamp.g4{border-color:var(--mid); color:var(--mid); background:var(--mid-soft);}
  .stamp.g5, .stamp.g6{border-color:var(--bad); color:var(--bad); background:var(--bad-soft);}

  /* Report tab */
  .filter-row{display:flex; gap:8px; margin-bottom:18px; flex-wrap:wrap;}
  .filter-btn{
    padding:9px 16px; border-radius:20px; border:1px solid var(--line); background:#fff;
    font-weight:600; font-size:0.85rem; min-height:40px;
  }
  .filter-btn.active{background:var(--ink); color:#fff; border-color:var(--ink);}
  .report-summary{display:flex; gap:14px; margin-bottom:22px; flex-wrap:wrap;}
  .sum-card{flex:1; min-width:150px; background:var(--paper); border:1px solid var(--line); border-radius:12px; padding:16px 18px; box-shadow:var(--shadow);}
  .sum-card .k{font-size:0.78rem; color:var(--ink-soft); font-weight:600; text-transform:uppercase; letter-spacing:0.03em;}
  .sum-card .v{font-family:'Space Grotesk',sans-serif; font-size:1.7rem; font-weight:700; margin-top:4px;}

  table.report{width:100%; border-collapse:collapse; background:var(--paper); border-radius:12px; overflow:hidden; box-shadow:var(--shadow);}
  table.report thead th{
    text-align:left; font-size:0.72rem; text-transform:uppercase; letter-spacing:0.04em; color:var(--ink-soft);
    padding:12px 14px; background:var(--bg); border-bottom:1px solid var(--line);
  }
  table.report tbody td{padding:12px 14px; border-bottom:1px solid var(--line); font-size:0.9rem;}
  table.report tbody tr:last-child td{border-bottom:none;}
  table.report .name-chris{color:var(--chris); font-weight:700;}
  table.report .name-sofia{color:var(--sofia); font-weight:700;}
  .note-chip{font-weight:700; padding:2px 9px; border-radius:20px; font-size:0.82rem;}
  .del-btn{background:none; border:none; color:var(--ink-soft); font-size:0.8rem; text-decoration:underline; min-height:auto; padding:2px;}
  .empty-state{padding:40px 20px; text-align:center; color:var(--ink-soft); background:var(--paper); border:1px dashed var(--line); border-radius:12px;}

  .progress-bar-outer{width:100%; height:8px; background:#eef1f3; border-radius:6px; overflow:hidden; margin-top:6px;}
  .progress-bar-inner{height:100%; border-radius:6px;}

  section.tabview{display:none;}
  section.tabview.active{display:block;}

  .app-header{
    background:var(--ink); color:#fff; padding:12px 22px; display:flex; align-items:center; gap:10px;
    font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:1.05rem; letter-spacing:-0.01em;
    position:sticky; top:0; z-index:30;
  }
  .app-header .icon{font-size:1.2rem;}

  @media (max-width: 860px){
    .sidebar{display:none;}
    .topbar{
      display:flex; gap:6px; padding:10px 12px; background:var(--paper); border-bottom:1px solid var(--line);
      position:sticky; top:52px; z-index:10; overflow-x:auto;
    }
    .topbar button{
      flex-shrink:0; padding:9px 14px; border-radius:8px; border:1px solid var(--line); background:#fff;
      font-weight:600; font-size:0.85rem; min-height:40px;
    }
    .topbar button.active{background:var(--ink); color:#fff; border-color:var(--ink);}
    main{padding:18px 14px 60px;}
    .child-header h2{font-size:1.35rem;}
  }
</style>
</head>

<script>
/* ============ DATENSPEICHER (Firebase Realtime Database) ============
   So richtest du es ein (5 Minuten, kein Programmieren nГ¶tig):

   1) In der Firebase-Konsole (console.firebase.google.com), dein Projekt
      Г¶ffnen -> im MenГј links "Build" -> "Realtime Database"
      (NICHT "Firestore" вҖ” das ist ein anderes Produkt).
   2) "Datenbank erstellen" klicken -> Standort wГӨhlen -> im Testmodus starten.
   3) Oben auf der Datenbank-Seite steht eine Adresse, z.B.:
        https://mathemasters-2026-default-rtdb.europe-west1.firebasedatabase.app
      Genau diese Adresse unten bei DB_URL eintragen (ohne SchrГӨgstrich am Ende).
   4) Im Tab "Regeln" Folgendes eintragen und "VerГ¶ffentlichen" klicken:
        {
          "rules": { ".read": true, ".write": true }
        }
   Das war's вҖ” keine weiteren Dateien, keine Bibliotheken, kein SDK.
   ========================================== */
const DB_URL = "https://mathemasters-8d2b8-default-rtdb.europe-west1.firebasedatabase.app";
const DB_CONFIGURED = !DB_URL.includes("HIER_");
if(!DB_CONFIGURED){
  console.warn("DB_URL ist noch nicht eingetragen вҖ” Fortschritt wird nicht gespeichert, bis eine echte Datenbank-Adresse eingetragen ist.");
}

function withTimeout(promise, ms){
  return Promise.race([
    promise,
    new Promise((_, reject) => setTimeout(() => reject(new Error("ZeitГјberschreitung")), ms))
  ]);
}

async function safeJson(res){
  const text = await res.text();
  if(!text) return null;
  try{ return JSON.parse(text); }
  catch(e){ throw new Error("Antwort war kein gГјltiges JSON (evtl. DB_URL falsch/nicht gesetzt)"); }
}

async function fsGet(coll, id){
  if(!DB_CONFIGURED) return null;
  const res = await withTimeout(fetch(`${DB_URL}/${coll}/${id}.json`), 4000);
  return await safeJson(res);
}
async function fsSet(coll, id, data){
  if(!DB_CONFIGURED) return;
  await withTimeout(fetch(`${DB_URL}/${coll}/${id}.json`, {
    method: "PUT", headers: {"Content-Type":"application/json"}, body: JSON.stringify(data)
  }), 4000);
}
async function fsDelete(coll, id){
  if(!DB_CONFIGURED) return;
  await withTimeout(fetch(`${DB_URL}/${coll}/${id}.json`, { method: "DELETE" }), 4000);
}
async function fsListAll(coll){
  if(!DB_CONFIGURED) return [];
  const res = await withTimeout(fetch(`${DB_URL}/${coll}.json`), 4000);
  const data = await safeJson(res);
  if(!data) return [];
  return Object.keys(data).map(id => ({ id, data: data[id] }));
}

/* ============ DATEN ============ */
const NOTE_LABEL = {1:"sehr gut",2:"gut",3:"befriedigend",4:"ausreichend",5:"mangelhaft",6:"ungenГјgend"};

function ex(a,p,w,l){ return {a,p,w,l}; }
function tq(a,w,l){ return {kind:"single", a, w, l}; }
function mq(context, parts){ return {kind:"multi", context, parts: parts.map(([label,a,w,l,calc])=>({label,a,w,l,calc}))}; }

const DATA = {
  chris: {
    name:"Chris", label:"Kl. 7 вҶ’ 8", color:"chris",
    weeks: [
      { num:1, range:"06.07. вҖ“ 11.07.2026", topic:"Prozentrechnung (Wiederholung)",
        days:[
          { label:"Tag 1", date:"Mo, 06.07.", exercises:[
            ex("In einer Klasse von 28 SchГјlern sind 25% Mitglieder im Sportverein. Wie viele SchГјler sind das?",
              "Prozentwert W = Grundwert G В· (Prozentsatz p / 100).",
              "W = 28 В· 25/100\nW = 28 В· 0,25\nW = 7", "7 SchГјler"),
            ex("Ein Fahrrad kostet ursprГјnglich 240 вӮ¬. Es wird um 15% reduziert. Wie viel вӮ¬ sind das?",
              "Der Rabatt ist der Prozentwert: W = G В· p/100.",
              "W = 240 В· 15/100\nW = 240 В· 0,15\nW = 36", "36 вӮ¬ Rabatt (neuer Preis: 204 вӮ¬)"),
            ex("Ein Smartphone kostet 320 вӮ¬. Der Preis wird um 12% erhГ¶ht. Um wie viel вӮ¬ steigt der Preis?",

function normalizeAnswerText(s){
  return s.toLowerCase().replace(/[вӮ¬%В°]/g,"").replace(/\s+/g," ").trim();
}
function extractNumbers(s){
  // Alle Varianten von Minuszeichen (typografisch "вҲ’", Gedankenstriche "вҖ“" "вҖ”")
  // auf das normale Tastatur-Minus "-" vereinheitlichen, damit negative Zahlen
  // in MusterlГ¶sungen IMMER korrekt erkannt werden, unabhГӨngig davon, welches
  // Zeichen beim Erstellen der Aufgabe verwendet wurde.
  const unified = s.replace(/[\u2212\u2013\u2014]/g, "-");
  const cleaned = unified.replace(/(\d),(\d)/g, "$1.$2");
  const matches = cleaned.match(/-?\d+(\.\d+)?/g);
  return matches ? matches.map(Number) : [];
}
function firstNum(s){ const m = extractNumbers(s||""); return m.length ? m[0] : NaN; }
function isAnswerCorrect(correctStr, inputStr){
  const val = (inputStr || "").trim();
  if(!val) return false;
  const numsCorrect = extractNumbers(correctStr);
  const numsInput = extractNumbers(val);
  if(numsCorrect.length > 0){
    if(numsInput.length === 0) return false;
    const usedCorrect = new Set();
    for(const iNum of numsInput){
      let found = false;
      for(let j=0;j<numsCorrect.length;j++){
        if(usedCorrect.has(j)) continue;
        const c = numsCorrect[j];
        const tol = Math.max(0.05, Math.abs(c)*0.02);
        if(Math.abs(iNum-c) <= tol){ usedCorrect.add(j); found = true; break; }
      }
      if(!found) return false;
    }
    return true;
  }
  const correctNoParens = correctStr.replace(/\([^)]*\)/g, " ");
  const normC = normalizeAnswerText(correctNoParens).replace(/[.,;:]/g,"");
  const normI = normalizeAnswerText(val).replace(/[.,;:()]/g,"");
  if(!normI) return false;
  const stop = new Set(["und","der","die","das","ist","sind","ein","eine","nicht","wieder","entspricht","betrГӨgt","da","im","de"]);
  const words = normC.split(" ").filter(w=>w.length>=2 && !stop.has(w));
  if(words.length===0) return normI.includes(normC.trim());
  return words.every(w=>normI.includes(w));
}

function noteFromPercent(p){
  if(p>=93) return 1;
  if(p>=75) return 2;
  if(p>=60) return 3;
  if(p>=40) return 4;
  if(p>=20) return 5;
  return 6;
}
function noteClass(n){ return n<=2?"done-good":(n<=4?"done-mid":"done-bad"); }
function stampClass(n){ return "g"+n; }

async function initChild(childKey){
  const child = DATA[childKey];
  const view = document.getElementById("view-"+childKey);
  view.innerHTML = `
    <div class="child-header">
      <h2>${child.name}</h2>
      <span class="badge-grade ${child.color}">${child.label}</span>
    </div>
    <div class="child-sub">6 Wochen Sommerferien 2026 В· MoвҖ“Fr Гңbung mit ca. 9 Aufgaben pro Tag (30 Min) В· Test am Wochenende, ca. 30 Min, freigeschaltet nach Tag 5</div>
    <div id="weeks-${childKey}"></div>
  `;
  const container = document.getElementById(`weeks-${childKey}`);

  // Alle Wochen-Daten parallel laden (nicht nacheinander), damit ein langsames
  // oder nicht erreichbares Firebase die App nicht lange blockiert.
  await Promise.all(child.weeks.map(async (week) => {
    const cacheKeyR = `${childKey}:w${week.num}`;
    const jobs = [];
    if(!(cacheKeyR in RESULT_CACHE)) jobs.push(loadResult(childKey, week.num).then(v => RESULT_CACHE[cacheKeyR] = v));
    if(!(cacheKeyR in PROGRESS_CACHE)) jobs.push(loadProgress(childKey, week.num, week.days.length).then(v => PROGRESS_CACHE[cacheKeyR] = v));
    if(week.bigExam && !(cacheKeyR in BIGEXAM_CACHE)) jobs.push(loadBigExamResult(childKey, week.num).then(v => BIGEXAM_CACHE[cacheKeyR] = v));
    await Promise.all(jobs);
  }));

  for(const week of child.weeks){
    const weekEl = document.createElement("div");
    weekEl.className = "week";
    weekEl.id = `week-${childKey}-${week.num}`;
    container.appendChild(weekEl);
    try{
      renderWeek(childKey, week, weekEl);
    }catch(e){
      console.error(`Fehler beim Anzeigen von ${childKey} Woche ${week.num}`, e);
      weekEl.innerHTML = `<div class="week-head"><div class="week-head-left"><div class="week-title">Woche ${week.num}: ${week.topic}</div></div></div>
        <div style="padding:16px 20px; color:var(--bad); font-size:0.85rem;">Diese Woche konnte nicht angezeigt werden (Fehler: ${(e && e.message) || e}). Bitte Seite neu laden; falls das nicht hilft, Bescheid geben.</div>`;
    }
  }
}

function pillForWeek(childKey, week){
  const res = RESULT_CACHE[`${childKey}:w${week.num}`];
  if(!res) return `<span class="pill pending">Test offen</span>`;
  const cls = res.note<=2 ? "done-good" : (res.note<=4 ? "done-mid" : "done-bad");
  return `<span class="pill ${cls}">Note ${res.note} В· ${res.percent}%</span>`;
}

function renderWeek(childKey, week, weekEl){
  const child = DATA[childKey];
  weekEl.innerHTML = `
    <div class="week-head">
      <div class="week-head-left">
        <div class="week-num ${child.color}">${week.num}</div>
        <div>
          <div class="week-title">${week.topic}</div>
          <div class="week-range">${week.range}</div>
        </div>
      </div>
      <div class="week-status">
        ${pillForWeek(childKey, week)}
        <span class="chevron">в–¶</span>
      </div>
    </div>
    <div class="week-body"></div>
  `;
  const head = weekEl.querySelector(".week-head");
  const body = weekEl.querySelector(".week-body");
  head.addEventListener("click", ()=>{
    weekEl.classList.toggle("open");
  });

  const progress = PROGRESS_CACHE[`${childKey}:w${week.num}`];
  let testEl; // wird nach der Tagesschleife erzeugt, hier fГјr die Freischaltungs-Callbacks vordeklariert
  let examEl; // groГҹe PrГјfung, wird freigeschaltet sobald der Wochentest fertig ist

  week.days.forEach((day, dIdx)=>{
    const dayEl = document.createElement("div");
    dayEl.className = "day";
    dayEl.innerHTML = `<div class="day-label">${day.label} <span class="date">вҖ” ${day.date}</span></div>`;
    day.exercises.forEach((exItem, eIdx)=>{
      const saved = (progress[dIdx] && typeof progress[dIdx][eIdx] === "object" && progress[dIdx][eIdx]) ? progress[dIdx][eIdx] : null;
      const card = document.createElement("div");
      card.className = "ex-card";
      card.innerHTML = `
        <div class="ex-aufgabe"><b>Aufgabe ${eIdx+1}:</b> ${exItem.a}</div>
        <div class="ans-row">
          <label class="ans-label">LГ¶sung:</label>
          <input type="text" class="ans-input" placeholder="Antwort eintragen вҖҰ">
          <span class="ans-icon"></span>
          <button class="btn hint-btn">рҹ’Ў Prinzip zeigen</button>
        </div>
        <div class="reveal-slot" data-slot="p"></div>
        <div class="reveal-slot" data-slot="w"></div>
      `;
      const input = card.querySelector(".ans-input");
      const icon = card.querySelector(".ans-icon");

      if(saved && saved.c){
        input.value = saved.v;
        input.classList.add("correct");
        icon.textContent = "вң…";
      }

      async function persistCorrect(value){
        if(!progress[dIdx]) progress[dIdx] = [];
        progress[dIdx][eIdx] = {v: value, c: true};
        await saveProgress(childKey, week.num, progress);
        if(testEl && testEl._maybeUnlock) testEl._maybeUnlock();
      }

      function checkAnswer(){
        const val = input.value.trim();
        if(!val) return;
        const correct = isAnswerCorrect(exItem.l, val);
        input.classList.remove("correct","incorrect");
        if(correct){
          input.classList.add("correct");
          icon.textContent = "вң…";
          persistCorrect(val);
        } else {
          input.classList.add("incorrect");
          icon.textContent = "вқҢ";
          setTimeout(()=>{
            input.value = "";
            input.classList.remove("incorrect");
            icon.textContent = "";
            input.focus();
          }, 1300);
        }
      }

      input.addEventListener("input", ()=>{
        input.classList.remove("correct","incorrect");
        icon.textContent = "";
      });
      input.addEventListener("keydown", (e)=>{
        if(e.key === "Enter"){ e.preventDefault(); checkAnswer(); }
      });
      input.addEventListener("blur", checkAnswer);

      // Hinweis-Leiter: erst Prinzip, danach Rechenweg
      let hintStage = 0;
      const hintBtn = card.querySelector(".hint-btn");
      const stages = [
        {key:"p", cls:"prinzip", title:"Prinzip", text:exItem.p, label:"рҹ’Ў Prinzip zeigen"},
        {key:"w", cls:"weg", title:"Rechenweg", text:exItem.w, label:"вңҸпёҸ Rechenweg zeigen"}
      ];
      hintBtn.addEventListener("click", ()=>{
        const s = stages[hintStage];
        const slot = card.querySelector(`[data-slot="${s.key}"]`);
        slot.innerHTML = `<div class="reveal-block ${s.cls}"><span class="label">${s.title}</span>${s.text.replace(/\n/g,"<br>")}</div>`;
        hintStage++;
        if(hintStage < stages.length){
          hintBtn.textContent = stages[hintStage].label;
        } else {
          hintBtn.remove();
        }
      });

      dayEl.appendChild(card);
    });
    body.appendChild(dayEl);
  });

  // Test block (gesperrt bis Tag 5 vollstГӨndig gelГ¶st)
  const lastDayIdx = week.days.length - 1;
  const lastDayTotal = week.days[lastDayIdx].exercises.length;
  function isLastDayComplete(){
    const arr = (progress[lastDayIdx] || []);
    return arr.filter(v => v && typeof v === "object" && v.c === true).length >= lastDayTotal;
  }

  // Testaufgaben zu einer flachen Liste bewerteter Items aufbereiten (fГјr Punkte & Rendering)
  const flatItems = [];
  week.test.problems.forEach((p, pIdx)=>{
    if(p.kind === "multi"){
      p.parts.forEach((part, partIdx)=>{
        flatItems.push({groupIdx:pIdx, context:p.context, label:part.label, a:part.a, w:part.w, l:part.l, isFirstOfGroup: partIdx===0, isMulti:true});
      });
    } else {
      flatItems.push({groupIdx:pIdx, a:p.a, w:p.w, l:p.l, isFirstOfGroup:true, isMulti:false});
    }
  });

  testEl = document.createElement("div");
  testEl.className = "test-block";

  function renderLocked(){
    testEl.innerHTML = `
      <div class="test-locked">
        <div class="lock-icon">рҹ”’</div>
        <div class="lock-text">
          <b>Wochentest вҖ” ${week.test.date}</b><br>Wird freigeschaltet, sobald Tag ${week.days.length} vollstГӨndig gelГ¶st ist (${(progress[lastDayIdx]||[]).filter(v=>v&&v.c).length}/${lastDayTotal}).
        </div>
      </div>
    `;
  }

  function renderUnlocked(isPreview){
    const existing = RESULT_CACHE[`${childKey}:w${week.num}`];
    const maxPerQ = 5;
    const maxTotal = flatItems.length * maxPerQ;

    if(existing){
      renderReview(existing, isPreview);
      return;
    }

    testEl.innerHTML = `
      ${isPreview ? '<div class="preview-banner">рҹ‘Җ Testmodus-Vorschau вҖ” Tag '+week.days.length+' ist noch nicht vollstГӨndig gelГ¶st. Dieser Test wГӨre fГјr das Kind noch gesperrt.</div>' : ''}
      <div class="test-head"><h4>рҹ“қ Wochentest вҖ” ${week.test.date}</h4></div>
      <div class="test-sub">${flatItems.length} Aufgaben Г  ${maxPerQ} Punkte (max. ${maxTotal} Punkte) В· ca. 30 Minuten. Trag deine LГ¶sung ein вҖ” die Auswertung mit Rechenweg gibt es am Ende.</div>
      <div class="test-questions"></div>
      <div class="test-footer">
        <button class="save-btn">Test abschlieГҹen &amp; auswerten</button>
      </div>
    `;
    const qWrap = testEl.querySelector(".test-questions");
    const inputs = [];
    let lastGroup = null;
    let visibleNum = 0;
    flatItems.forEach((item, i)=>{
      if(item.isMulti && item.groupIdx !== lastGroup){
        const ctxEl = document.createElement("div");
        ctxEl.className = "test-context";
        visibleNum++;
        ctxEl.innerHTML = `<b>Aufgabe ${visibleNum}:</b> ${item.context}`;
        qWrap.appendChild(ctxEl);
        lastGroup = item.groupIdx;
      } else if(!item.isMulti){
        visibleNum++;
      }
      const qEl = document.createElement("div");
      qEl.className = "test-q" + (item.isMulti ? " test-q-part" : "");
      const qLabel = item.isMulti ? item.label : `Aufgabe ${visibleNum}:`;
      qEl.innerHTML = `
        <div class="test-q-text"><b>${qLabel}</b> ${item.a}</div>
        <div class="ans-row">
          <label class="ans-label">LГ¶sung:</label>
          <input type="text" class="ans-input" placeholder="Antwort eintragen вҖҰ">
        </div>
      `;
      const input = qEl.querySelector(".ans-input");
      inputs.push(input);
      qWrap.appendChild(qEl);
    });

    testEl.querySelector(".save-btn").addEventListener("click", async ()=>{
      const answers = inputs.map(inp => inp.value.trim());
      const groupGiven = {};
      const detail = flatItems.map((item, i)=>{
        let expected = item.l;
        let followThrough = false;
        if(item.isMulti && item.calc){
          const prev = groupGiven[item.groupIdx] || [];
          try{
            const calcResult = item.calc(prev);
            if(calcResult !== null && calcResult !== undefined && String(calcResult) !== item.l){
              expected = String(calcResult);
              followThrough = true;
            }
          }catch(e){}
        }
        const correct = isAnswerCorrect(expected, answers[i]);
        if(item.isMulti){
          if(!groupGiven[item.groupIdx]) groupGiven[item.groupIdx] = [];
          groupGiven[item.groupIdx].push(answers[i]);
        }
        return { a:item.a, given: answers[i], correct, points: correct ? maxPerQ : 0, max: maxPerQ, w:item.w, l:item.l,
                 label:item.label||null, context: item.isMulti ? item.context : null,
                 followThrough: followThrough && correct, expectedUsed: expected };
      });
      const sum = detail.reduce((s,d)=>s+d.points, 0);
      const percent = Math.round((sum/maxTotal)*1000)/10;
      const note = noteFromPercent(percent);
      const today = new Date().toLocaleDateString("de-DE");
      const result = {
        child: childKey, childName: child.name, week: week.num, topic: week.topic,
        testDate: week.test.date, savedOn: today,
        points: sum, max: maxTotal, percent, note, detail
      };
      const ok = await saveResult(childKey, week.num, result);
      if(ok){
        RESULT_CACHE[`${childKey}:w${week.num}`] = result;
        const pillHost = weekEl.querySelector(".week-status");
        pillHost.querySelector(".pill").outerHTML = pillForWeek(childKey, week);
        renderReview(result, isPreview);
        if(week.bigExam && examEl && examEl._unlock) examEl._unlock();
      } else {
        alert("Speichern fehlgeschlagen вҖ” bitte erneut versuchen.");
      }
    });
  }

  function renderReview(result, isPreview){
    const maxPerQ = 5;
    let lastGroup = null;
    let visibleNum = 0;
    const rows = result.detail.map((d, i)=>{
      const flatItem = flatItems[i];
      let header = "";
      if(flatItem.isMulti && flatItem.groupIdx !== lastGroup){
        visibleNum++;
        header = `<div class="test-context"><b>Aufgabe ${visibleNum}:</b> ${flatItem.context}</div>`;
        lastGroup = flatItem.groupIdx;
      } else if(!flatItem.isMulti){
        visibleNum++;
      }
      const qLabel = flatItem.isMulti ? flatItem.label : `Aufgabe ${visibleNum}:`;
      const cls = d.correct ? "review-correct" : "review-wrong";
      const icon = d.correct ? "вң…" : "вқҢ";
      const followNote = d.followThrough ? `<div class="review-line followthrough-note">вҶӘ Folgefehler korrekt fortgefГјhrt: Mit deinem vorherigen Ergebnis weitergerechnet ist ${d.expectedUsed} die richtige FortfГјhrung вҖ” das hast du richtig gemacht!</div>` : "";
      return `
        ${header}
        <div class="review-item ${cls}">
          <div class="review-q"><b>${qLabel}</b> ${d.a}</div>
          <div class="review-line"><span class="review-label">Deine LГ¶sung:</span> ${d.given ? d.given : "<em>(keine Eingabe)</em>"} ${icon}</div>
          <div class="review-line"><span class="review-label">Punkte:</span> ${d.points} von ${d.max}</div>
          <div class="review-line"><span class="review-label">Rechenweg:</span> ${d.w.replace(/\n/g,"<br>")}</div>
          <div class="review-line"><span class="review-label">Richtiges Ergebnis:</span> <b>${d.l}</b></div>
          ${followNote}
        </div>
      `;
    }).join("");

    testEl.innerHTML = `
      ${isPreview ? '<div class="preview-banner">рҹ‘Җ Testmodus-Vorschau</div>' : ''}
      <div class="test-head"><h4>рҹ“қ Wochentest вҖ” ${result.testDate}</h4></div>
      <div class="stamp ${stampClass(result.note)}" style="margin-bottom:16px;"><span class="n">${result.note}</span><span class="t">${NOTE_LABEL[result.note]}<br>${result.points}/${result.max} Punkte В· ${result.percent}%</span></div>
      <div class="review-list">${rows}</div>
    `;
  }

  let testUnlocked = isLastDayComplete();
  if(testUnlocked){ renderUnlocked(); } else { renderLocked(); }

  // Wird von den Aufgaben des letzten Tages aufgerufen, sobald eine LГ¶sung richtig eingetragen wird
  testEl._maybeUnlock = function(){
    if(!testUnlocked && isLastDayComplete()){
      testUnlocked = true;
      renderUnlocked();
    }
  };

  body.appendChild(testEl);

  // ---- GroГҹe PrГјfung (60 Min, cumulativ) вҖ” nur bei Wochen mit week.bigExam ----
  if(week.bigExam){
    const examMaxPerQ = 5;
    const examFlat = [];
    week.bigExam.problems.forEach((p, pIdx)=>{
      if(p.kind === "multi"){
        p.parts.forEach((part, partIdx)=>{
          examFlat.push({groupIdx:pIdx, context:p.context, label:part.label, a:part.a, w:part.w, l:part.l, isFirstOfGroup: partIdx===0, isMulti:true});
        });
      } else {
        examFlat.push({groupIdx:pIdx, a:p.a, w:p.w, l:p.l, isFirstOfGroup:true, isMulti:false});
      }
    });
    const examMaxTotal = examFlat.length * examMaxPerQ;
    examEl = document.createElement("div");
    examEl.className = "test-block big-exam-block";

    function examLockedView(){
      examEl.innerHTML = `
        <div class="test-locked">
          <div class="lock-icon">рҹҸҶ</div>
          <div class="lock-text"><b>GroГҹe PrГјfung вҖ” ${week.bigExam.date} (60 Minuten)</b><br>Wird freigeschaltet, sobald der Wochentest dieser Woche abgeschlossen ist.</div>
        </div>
      `;
    }

    function examUnlockedView(){
      const existing = BIGEXAM_CACHE[`${childKey}:w${week.num}`];
      if(existing){
        examReviewView(existing);
        return;
      }
      examEl.innerHTML = `
        <div class="test-head"><h4>рҹҸҶ GroГҹe PrГјfung вҖ” ${week.bigExam.date} (ca. 60 Minuten)</h4></div>
        <div class="test-sub">${examFlat.length} Aufgaben Г  ${examMaxPerQ} Punkte (max. ${examMaxTotal} Punkte). Kombiniert alle Themen dieses Wochenblocks. Trag deine LГ¶sung ein вҖ” die ausfГјhrliche Auswertung mit Rechenweg gibt es am Ende.</div>
        <div class="test-questions"></div>
        <div class="test-footer">
          <button class="save-btn">PrГјfung abschlieГҹen &amp; auswerten</button>
        </div>
      `;
      const qWrap = examEl.querySelector(".test-questions");
      const inputs = [];
      let lastGroup = null;
      let visibleNum = 0;
      examFlat.forEach((item)=>{
        if(item.isMulti && item.groupIdx !== lastGroup){
          const ctxEl = document.createElement("div");
          ctxEl.className = "test-context";
          visibleNum++;
          ctxEl.innerHTML = `<b>Aufgabe ${visibleNum}:</b> ${item.context}`;
          qWrap.appendChild(ctxEl);
          lastGroup = item.groupIdx;
        } else if(!item.isMulti){
          visibleNum++;
        }
        const qEl = document.createElement("div");
        qEl.className = "test-q" + (item.isMulti ? " test-q-part" : "");
        const qLabel = item.isMulti ? item.label : `Aufgabe ${visibleNum}:`;
        qEl.innerHTML = `
          <div class="test-q-text"><b>${qLabel}</b> ${item.a}</div>
          <div class="ans-row">
            <label class="ans-label">LГ¶sung:</label>
            <input type="text" class="ans-input" placeholder="Antwort eintragen вҖҰ">
          </div>
        `;
        inputs.push(qEl.querySelector(".ans-input"));
        qWrap.appendChild(qEl);
      });

      examEl.querySelector(".save-btn").addEventListener("click", async ()=>{
        const answers = inputs.map(inp => inp.value.trim());
        const groupGiven = {};
        const detail = examFlat.map((item, i)=>{
          let expected = item.l;
          let followThrough = false;
          if(item.isMulti && item.calc){
            const prev = groupGiven[item.groupIdx] || [];
            try{
              const calcResult = item.calc(prev);
              if(calcResult !== null && calcResult !== undefined && String(calcResult) !== item.l){
                expected = String(calcResult);
                followThrough = true;
              }
            }catch(e){}
          }
          const correct = isAnswerCorrect(expected, answers[i]);
          if(item.isMulti){
            if(!groupGiven[item.groupIdx]) groupGiven[item.groupIdx] = [];
            groupGiven[item.groupIdx].push(answers[i]);
          }
          return { a:item.a, given: answers[i], correct, points: correct?examMaxPerQ:0, max:examMaxPerQ, w:item.w, l:item.l,
                   label:item.label||null, context: item.isMulti?item.context:null,
                   followThrough: followThrough && correct, expectedUsed: expected };
        });
        const sum = detail.reduce((s,d)=>s+d.points,0);
        const percent = Math.round((sum/examMaxTotal)*1000)/10;
        const note = noteFromPercent(percent);
        const today = new Date().toLocaleDateString("de-DE");
        const result = { child:childKey, childName:child.name, week:week.num, topic:"GroГҹe PrГјfung: "+week.topic,
          testDate: week.bigExam.date, savedOn: today, points:sum, max:examMaxTotal, percent, note, detail };
        const ok = await saveBigExamResult(childKey, week.num, result);
        if(ok){
          BIGEXAM_CACHE[`${childKey}:w${week.num}`] = result;
          examReviewView(result);
        } else {
          alert("Speichern fehlgeschlagen вҖ” bitte erneut versuchen.");
        }
      });
    }

    function examReviewView(result){
      let lastGroup = null, visibleNum = 0;
      const rows = result.detail.map((d,i)=>{
        const item = examFlat[i];
        let header = "";
        if(item.isMulti && item.groupIdx !== lastGroup){
          visibleNum++;
          header = `<div class="test-context"><b>Aufgabe ${visibleNum}:</b> ${item.context}</div>`;
          lastGroup = item.groupIdx;
        } else if(!item.isMulti){ visibleNum++; }
        const qLabel = item.isMulti ? item.label : `Aufgabe ${visibleNum}:`;
        const cls = d.correct ? "review-correct" : "review-wrong";
        const icon = d.correct ? "вң…" : "вқҢ";
        const followNote = d.followThrough ? `<div class="review-line followthrough-note">вҶӘ Folgefehler korrekt fortgefГјhrt: Mit deinem vorherigen Ergebnis weitergerechnet ist ${d.expectedUsed} die richtige FortfГјhrung вҖ” das hast du richtig gemacht!</div>` : "";
        return `
          ${header}
          <div class="review-item ${cls}">
            <div class="review-q"><b>${qLabel}</b> ${d.a}</div>
            <div class="review-line"><span class="review-label">Deine LГ¶sung:</span> ${d.given ? d.given : "<em>(keine Eingabe)</em>"} ${icon}</div>
            <div class="review-line"><span class="review-label">Punkte:</span> ${d.points} von ${d.max}</div>
            <div class="review-line"><span class="review-label">AusfГјhrlicher Rechenweg:</span> ${d.w.replace(/\n/g,"<br>")}</div>
            <div class="review-line"><span class="review-label">Richtiges Ergebnis:</span> <b>${d.l}</b></div>
            ${followNote}
          </div>
        `;
      }).join("");
      examEl.innerHTML = `
        <div class="test-head"><h4>рҹҸҶ GroГҹe PrГјfung вҖ” ${result.testDate}</h4></div>
        <div class="stamp ${stampClass(result.note)}" style="margin-bottom:16px;"><span class="n">${result.note}</span><span class="t">${NOTE_LABEL[result.note]}<br>${result.points}/${result.max} Punkte В· ${result.percent}%</span></div>
        <div class="review-list">${rows}</div>
      `;
    }

    if(RESULT_CACHE[`${childKey}:w${week.num}`]){
      examUnlockedView();
    } else {
      examLockedView();
    }
    examEl._unlock = function(){
      if(!BIGEXAM_CACHE[`${childKey}:w${week.num}`]) examUnlockedView();
    };
    body.appendChild(examEl);
  }
}

/* ============ REPORT / AUSWERTUNG ============ */
let REPORT_FILTER = "all";

async function renderReport(){
  const view = document.getElementById("view-report");
  view.innerHTML = `<div class="empty-state">Lade Auswertung вҖҰ</div>`;
  try{
    await renderReportInner(view);
  }catch(e){
    console.error("Fehler beim Laden der Auswertung", e);
    view.innerHTML = `<div class="child-header"><h2>Auswertung</h2></div>
      <div class="empty-state">Die Auswertung konnte nicht geladen werden (Fehler: ${(e && e.message) || e}).<br>Bitte Seite neu laden; falls das nicht hilft, Bescheid geben.</div>`;
  }
}

async function renderReportInner(view){
  const networkResults = await listAllResults();
  const progressMap = await listAllProgress();

  // Netz-Ergebnisse mit lokal bereits bekanntem Stand zusammenfuehren
  // (lokal hat Vorrang, falls das Speichern noch nicht bestaetigt wurde)
  const resultMap = {};
  networkResults.forEach(r => { resultMap[`${r.child}:w${r.week}`] = r; });
  Object.keys(RESULT_CACHE).forEach(key => {
    if(RESULT_CACHE[key]) resultMap[key] = RESULT_CACHE[key];
  });
  const results = Object.values(resultMap);

  results.sort((a,b)=> a.child===b.child ? a.week-b.week : a.child.localeCompare(b.child));

  const avg = arr => arr.length ? Math.round((arr.reduce((s,r)=>s+r.note,0)/arr.length)*10)/10 : "вҖ“";

  function dayDone(childKey, weekNum, dIdx){
    const cacheKey = `${childKey}:w${weekNum}`;
    // Lokal bereits geladener/aktualisierter Stand hat Vorrang (immer aktuell,
    // auch wenn das Speichern in der Datenbank noch nicht bestaetigt ist).
    const arr = PROGRESS_CACHE[cacheKey] || progressMap[`progress:${cacheKey}`] || [];
    const dayArr = arr[dIdx] || [];
    return dayArr.filter(v => v && typeof v === "object" && v.c === true).length;
  }
  function progressCount(childKey){
    let done=0, total=0;
    DATA[childKey].weeks.forEach(w=>{
      w.days.forEach((day, dIdx)=>{
        total += day.exercises.length;
        done += dayDone(childKey, w.num, dIdx);
      });
    });
    return {done, total};
  }
  const cProg = progressCount("chris");
  const sProg = progressCount("sofia");

  // Fortlaufende Tagesliste (keine Wochenspalte, Tag zГӨhlt pro Kind durch)
  const dailyRows = [];
  ["chris","sofia"].forEach(childKey=>{
    const child = DATA[childKey];
    let dayCounter = 0;
    child.weeks.forEach(w=>{
      w.days.forEach((day, dIdx)=>{
        dayCounter++;
        const done = dayDone(childKey, w.num, dIdx);
        const total = day.exercises.length;
        dailyRows.push({childKey, childName:child.name, topic:w.topic, date:day.date, dayNum:dayCounter, done, total});
      });
    });
  });

  view.innerHTML = `
    <div class="child-header"><h2>Auswertung</h2></div>
    <div class="child-sub">TГӨgliche Umsetzung und Wochentests von Chris und Sofia gebГјndelt im Гңberblick.</div>

    <div class="filter-row">
      <button class="filter-btn" data-f="all">Alle</button>
      <button class="filter-btn" data-f="chris">рҹ”ө Chris</button>
      <button class="filter-btn" data-f="sofia">рҹҹЈ Sofia</button>
    </div>

    <div class="report-summary" id="summary-cards">
      <div class="sum-card" data-child="chris"><div class="k">Chris вҖ” Гҳ Note</div><div class="v" style="color:var(--chris)">${avg(results.filter(r=>r.child==="chris"))}</div></div>
      <div class="sum-card" data-child="sofia"><div class="k">Sofia вҖ” Гҳ Note</div><div class="v" style="color:var(--sofia)">${avg(results.filter(r=>r.child==="sofia"))}</div></div>
      <div class="sum-card" data-child="chris">
        <div class="k">Chris вҖ” Гңbungen erledigt</div>
        <div class="v">${cProg.done}/${cProg.total}</div>
        <div class="progress-bar-outer"><div class="progress-bar-inner" style="width:${cProg.total? (cProg.done/cProg.total*100):0}%; background:var(--chris);"></div></div>
      </div>
      <div class="sum-card" data-child="sofia">
        <div class="k">Sofia вҖ” Гңbungen erledigt</div>
        <div class="v">${sProg.done}/${sProg.total}</div>
        <div class="progress-bar-outer"><div class="progress-bar-inner" style="width:${sProg.total? (sProg.done/sProg.total*100):0}%; background:var(--sofia);"></div></div>
      </div>
    </div>

    <h3 style="margin:26px 0 12px; font-size:1.1rem;">рҹ“… TГӨgliche Umsetzung</h3>
    <table class="report" style="margin-bottom:30px;">
      <thead><tr>
        <th>Kind</th><th>Thema</th><th>Datum</th><th>Tag</th><th>Erledigt</th><th>Fortschritt</th>
      </tr></thead>
      <tbody id="daily-body"></tbody>
    </table>

    <h3 style="margin:26px 0 12px; font-size:1.1rem;">рҹ“қ Wochentests</h3>
    <div id="results-holder"></div>
  `;

  function applyFilter(){
    document.querySelectorAll(".filter-btn").forEach(b=>b.classList.toggle("active", b.dataset.f===REPORT_FILTER));
    document.querySelectorAll("#summary-cards .sum-card").forEach(c=>{
      c.style.display = (REPORT_FILTER==="all" || c.dataset.child===REPORT_FILTER) ? "" : "none";
    });

    const dailyBody = document.getElementById("daily-body");
    dailyBody.innerHTML = "";
    dailyRows.filter(r=>REPORT_FILTER==="all" || r.childKey===REPORT_FILTER).forEach(r=>{
      const tr = document.createElement("tr");
      const nameClass = r.childKey==="chris" ? "name-chris" : "name-sofia";
      const barColor = r.childKey==="chris" ? "var(--chris)" : "var(--sofia)";
      const pct = r.total ? Math.round((r.done/r.total)*100) : 0;
      tr.innerHTML = `
        <td class="${nameClass}">${r.childName}</td>
        <td>${r.topic}</td>
        <td>${r.date}</td>
        <td>Tag ${r.dayNum}</td>
        <td>${r.done}/${r.total}</td>
        <td><div class="progress-bar-outer" style="width:100px;"><div class="progress-bar-inner" style="width:${pct}%; background:${barColor};"></div></div></td>
      `;
      dailyBody.appendChild(tr);
    });

    const resultsHolder = document.getElementById("results-holder");
    const filteredResults = results.filter(r=>REPORT_FILTER==="all" || r.child===REPORT_FILTER);
    if(filteredResults.length === 0){
      resultsHolder.innerHTML = `<div class="empty-state">Noch keine Tests gespeichert. Sobald ein Wochentest ausgewertet wird, erscheint er hier.</div>`;
      return;
    }
    resultsHolder.innerHTML = `
      <table class="report">
        <thead><tr>
          <th>Kind</th><th>Woche</th><th>Thema</th><th>Testtag</th><th>Punkte</th><th>%</th><th>Note</th><th>Gespeichert am</th><th></th>
        </tr></thead>
        <tbody id="report-body"></tbody>
      </table>
    `;
    const body = document.getElementById("report-body");
    filteredResults.forEach(r=>{
      const tr = document.createElement("tr");
      const nameClass = r.child==="chris" ? "name-chris" : "name-sofia";
      const chipCls = r.note<=2 ? "good" : (r.note<=4?"mid":"bad");
      tr.innerHTML = `
        <td class="${nameClass}">${r.childName}</td>
        <td>${r.week}</td>
        <td>${r.topic}</td>
        <td>${r.testDate}</td>
        <td>${r.points} / ${r.max}</td>
        <td>${r.percent}%</td>
        <td><span class="note-chip" style="background:var(--${chipCls}-soft); color:var(--${chipCls});">${r.note}</span></td>
        <td>${r.savedOn}</td>
        <td><button class="del-btn">lГ¶schen</button></td>
      `;
      tr.querySelector(".del-btn").addEventListener("click", async ()=>{
        if(confirm(`Testergebnis von ${r.childName}, Woche ${r.week} wirklich lГ¶schen?`)){
          await deleteResult(r.child, r.week);
          delete RESULT_CACHE[`${r.child}:w${r.week}`];
          renderReport();
        }
      });
      body.appendChild(tr);
    });
  }

  document.querySelectorAll(".filter-btn").forEach(b=>{
    b.addEventListener("click", ()=>{
      REPORT_FILTER = b.dataset.f;
      applyFilter();
    });
  });

  applyFilter();
}

/* ============ INIT ============ */
